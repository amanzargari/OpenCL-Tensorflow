name: Build and publish

# Runs on every version tag (v0.3.0, v1.0.0, …) and can be triggered manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build binary wheels for Linux x86_64
  #    Uses cibuildwheel inside a manylinux2014 container so the resulting
  #    wheels are compatible with any glibc >= 2.17 Linux distribution.
  # ---------------------------------------------------------------------------
  build-wheels:
    name: Build wheels (Linux x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # Python versions that TF 2.10-2.15 supports.
          CIBW_BUILD: "cp38-manylinux_x86_64 cp39-manylinux_x86_64 cp310-manylinux_x86_64 cp311-manylinux_x86_64"

          # manylinux2014 = CentOS 7 / glibc 2.17 compatible.
          # The official quay.io images ship cmake 3.26+ already.
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux2014_x86_64

          # Install OpenCL headers + ICD stub library for compilation.
          # EPEL provides opencl-headers and ocl-icd-devel on CentOS 7.
          CIBW_BEFORE_ALL: |
            yum install -y epel-release
            yum install -y opencl-headers ocl-icd-devel

          # Install TensorFlow before building each wheel so our setup.py can
          # query tf.sysconfig.get_compile_flags() / get_link_flags().
          CIBW_BEFORE_BUILD: |
            pip install "tensorflow>=2.10,<2.16" numpy

          # auditwheel repair bundles shared libs into the wheel — exclude:
          #   libOpenCL:              must come from the user's system ICD loader
          #   libtensorflow_framework: bundled with the tensorflow pip package
          CIBW_REPAIR_WHEEL_COMMAND: >-
            auditwheel repair
            --exclude libOpenCL.so.1
            --exclude libtensorflow_framework.so.2
            --exclude libtensorflow_framework.so.1
            -w {dest_dir} {wheel}

          # Smoke-test: just verify the .so loads cleanly (no real GPU needed
          # at import time — CLBackend is only initialised on first op call).
          CIBW_TEST_REQUIRES: tensorflow numpy
          CIBW_TEST_COMMAND: |
            python -c "import opencl_tf; print('opencl_tf', opencl_tf.__version__, 'imported OK')"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: ./wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # 2. Build a source distribution (sdist)
  #    Users install from sdist when no binary wheel matches their platform.
  #    They will need cmake + opencl-headers on their machine.
  # ---------------------------------------------------------------------------
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # 3. Publish to PyPI using OIDC trusted publishing (no API token needed).
  #    Set up trusted publishing once at pypi.org → your project → Publishing.
  #    Point it at: owner=<you>, repo=OpenCL-Tensorflow, workflow=publish.yml
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/opencl-tf

    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
